{% extends "base.html" %}
{% block content %}
<div class="products-page">
    <h2><i class="fas fa-store"></i> Каталог товаров</h2>

    <div class="products-grid">
        {% for product in products %}
        <div class="product-card animate__animated animate__fadeInUp">
            <div class="product-image-container">
                <img src="{{ url_for('static', filename='images/products/' + product.main_image) }}"
                     alt="{{ product.title }}"
                     class="product-image"
                     onerror="this.src='{{ url_for('static', filename='images/placeholders/no-image.jpg') }}'">
                {% if product.model_image %}
                <div class="image-badge">
                    <i class="fas fa-camera"></i>
                    <span>Есть фотосессия</span>
                </div>
                {% endif %}
            </div>
            <a href="{{ url_for('product_detail', pid=product.id) }}" class="product-title-link">
                <h3>{{ product.title }}</h3>
            </a>
            <div class="price">{{ product.price }}₽</div>
            <button class="btn-add glass-button" data-id="{{ product.id }}">
                <i class="fas fa-cart-plus"></i> Добавить в корзину
            </button>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
